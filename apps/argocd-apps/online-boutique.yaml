apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-boutique
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ebak555/aiops-sentinel.git
    targetRevision: main
    path: apps/online-boutique

  destination:
    server: https://kubernetes.default.svc
    namespace: online-boutique

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

  # GKE Autopilot's admission webhook mutates container resource requests/limits
  # (adds ephemeral-storage, normalizes memory) to meet its own minimums, which
  # otherwise shows as permanent drift against the manifests in git.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/spec/containers/0/resources
