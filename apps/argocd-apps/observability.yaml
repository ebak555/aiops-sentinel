apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ebak555/aiops-sentinel.git
    targetRevision: main
    path: apps/observability

  destination:
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

  # Same GKE Autopilot resource-mutation drift as online-boutique.yaml
  # (see Phase 1 notes) -- Autopilot adjusts container resource
  # requests/limits, which otherwise shows as permanent drift.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/spec/containers/0/resources
